log:
  enable: true
  level: info

server:
  hosts:
    - host1.example.com
    - host2.example.com
    - host3.example.com
  ports:
    - 8080
    - 8443
    - 9090
  enabled:
    - true
    - false
    - true
  endpoints:
    - host: endpoint1.example.com
      port: 8001
    - host: endpoint2.example.com
      port: 8002
  labels:
    env: production
    region: us-east-1
  port_map:
    http: 8080
    https: 8443
    grpc: 9090
  tags_by_service:
    user:
      - admin
      - backend
    order:
      - customer
      - payment
  services:
    user:
      host: user-service.example.com
      port: 8001
    order:
      host: order-service.example.com
      port: 8002
  advanced:
    tags:
      - tag1
      - tag2
      - tag3
    config:
      key1: value1
      key2: value2
    backends:
      - host: backend1.example.com
        port: 9001
      - host: backend2.example.com
        port: 9002
